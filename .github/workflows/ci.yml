name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Fast checks on stable: format, lint, build, unit + doc tests.
  test:
    name: test / fmt / clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (all targets, warnings = errors)
        run: cargo clippy --all-targets --all-features
      - name: Unit + doc tests
        run: cargo test --all-features
      - name: Build examples
        run: cargo build --examples --release

  # loom: exhaustive interleaving model-checking of the bounded scenarios.
  loom:
    name: loom model checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run loom suite
        # `--cfg loom` swaps std atomics for loom's, exploring every legal interleaving.
        run: RUSTFLAGS="--cfg loom" cargo test --release loom_

  # ThreadSanitizer: full concurrent test suite under the data-race detector.
  # Requires nightly + a from-source std build (-Zbuild-std) so the sanitizer instruments std.
  sanitizer:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests under ThreadSanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=thread"
        run: |
          cargo +nightly test --lib \
            -Zbuild-std \
            --target x86_64-unknown-linux-gnu
      - name: Run ported crossbeam stress suites under ThreadSanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=thread"
        run: |
          cargo +nightly test \
            --test crossbeam_lifo --test crossbeam_fifo --test crossbeam_steal \
            -Zbuild-std \
            --target x86_64-unknown-linux-gnu

  # Miri: detects undefined behaviour TSan can't — invalid pointer provenance, misaligned
  # accesses, reads of uninitialized memory, and (with the flags below) data races and leaks in
  # the unsafe `AtomicPtr`/raw-pointer code. CI installs a clean, version-matched Miri via rustup
  # each run, so it is unaffected by any local toolchain breakage.
  miri:
    name: Miri (UB detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Setup Miri
        run: cargo miri setup
      - name: Run unit tests under Miri
        # -Zmiri-ignore-leaks: the scheduler/stress tests intentionally leave threads running at
        #   scope exit; we assert no UB, not zero leaks here.
        # -Zmiri-disable-isolation: allows time/thread APIs the tests use.
        env:
          MIRIFLAGS: "-Zmiri-ignore-leaks -Zmiri-disable-isolation"
        run: cargo miri test --lib
      - name: Run ported crossbeam suites under Miri
        env:
          MIRIFLAGS: "-Zmiri-ignore-leaks -Zmiri-disable-isolation"
        # The stress tests scale themselves down under `cfg!(miri)` so they finish in CI time.
        run: |
          cargo miri test \
            --test crossbeam_lifo --test crossbeam_fifo --test crossbeam_steal

  # Minimum-supported-Rust-version build (no -D warnings, just must compile).
  msrv:
    name: MSRV (1.73)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.73.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-features
